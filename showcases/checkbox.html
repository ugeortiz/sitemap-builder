<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkbox — Vanilla Lexicon</title>
  <script>(function(){
    var S=['light','light-hc','dark','dark-hc'];
    function apply(){try{
      var r=document.documentElement;
      var s=localStorage.getItem('vanilla-skin')||'light';
      S.forEach(function(c){r.classList.remove(c);});
      r.classList.add(S.indexOf(s)>-1?s:'light');
      if(localStorage.getItem('vanilla-cms-style')==='1'){
        r.style.setProperty('--rounded-sm','4px');
        r.style.setProperty('--rounded-md','8px');
        r.style.setProperty('--rounded-lg','16px');
      }else{
        r.style.removeProperty('--rounded-sm');
        r.style.removeProperty('--rounded-md');
        r.style.removeProperty('--rounded-lg');
      }
    }catch(e){}}
    apply();
    window.addEventListener('pageshow',apply);
  })()</script>
  <link rel="stylesheet" href="../tokens.css">
  <link rel="stylesheet" href="../tokens-high-contrast.css">
  <link rel="stylesheet" href="../tokens-dark.css">
  <link rel="stylesheet" href="../components.css">
  <script src="../icons.js"></script>

  <style>
    .showcase {
      max-width: 720px;
      margin: 0 auto;
      padding: var(--spacing-9) var(--spacing-7);
    }
    .showcase h1 {
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-bold);
      margin: 0 0 var(--spacing-3);
    }
    .showcase p.lead {
      color: var(--color-secondary);
      font-size: var(--font-size-sm);
      margin: 0 0 var(--spacing-8);
    }
    .showcase__row {
      margin-bottom: var(--spacing-7);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: var(--spacing-7);
    }
    .showcase__label {
      flex: 0 0 100%;
      font-size: 10px;
      font-weight: var(--font-weight-bold);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--color-secondary);
      margin-bottom: 0;
    }
  </style>
</head>
<body>

<main class="showcase">
  <h1>Checkbox</h1>
  <p class="lead">
    Source: <a href="https://www.figma.com/design/YNNkt9Xd6ImDtEvIz4tETF/Lexicon-Components?node-id=493-12886">Figma — Lexicon Components</a>.
    Axes: checked, indeterminate, focus, disabled, label.
  </p>

  <!-- Row 1: bare boxes -->
  <div class="showcase__row">
    <span class="showcase__label">No label — unchecked, checked, focus</span>

    <label class="checkbox" aria-label="Unchecked">
      <input type="checkbox" class="checkbox__input">
      <span class="checkbox__box">
        <svg class="checkbox__icon checkbox__icon--check"><use href="#check-small"></use></svg>
        <svg class="checkbox__icon checkbox__icon--hr"><use href="#hr"></use></svg>
      </span>
    </label>

    <label class="checkbox" aria-label="Checked">
      <input type="checkbox" class="checkbox__input" checked>
      <span class="checkbox__box">
        <svg class="checkbox__icon checkbox__icon--check"><use href="#check-small"></use></svg>
        <svg class="checkbox__icon checkbox__icon--hr"><use href="#hr"></use></svg>
      </span>
    </label>

    <label class="checkbox" aria-label="Focused">
      <input type="checkbox" class="checkbox__input">
      <span class="checkbox__box">
        <svg class="checkbox__icon checkbox__icon--check"><use href="#check-small"></use></svg>
        <svg class="checkbox__icon checkbox__icon--hr"><use href="#hr"></use></svg>
      </span>
    </label>
  </div>

  <!-- Row 2: with label -->
  <div class="showcase__row">
    <span class="showcase__label">With label — unchecked, checked, indeterminate</span>

    <label class="checkbox">
      <input type="checkbox" class="checkbox__input">
      <span class="checkbox__box">
        <svg class="checkbox__icon checkbox__icon--check"><use href="#check-small"></use></svg>
        <svg class="checkbox__icon checkbox__icon--hr"><use href="#hr"></use></svg>
      </span>
      <span class="checkbox__label">Label</span>
    </label>

    <label class="checkbox">
      <input type="checkbox" class="checkbox__input" checked>
      <span class="checkbox__box">
        <svg class="checkbox__icon checkbox__icon--check"><use href="#check-small"></use></svg>
        <svg class="checkbox__icon checkbox__icon--hr"><use href="#hr"></use></svg>
      </span>
      <span class="checkbox__label">Label</span>
    </label>

    <label class="checkbox is-indeterminate">
      <input type="checkbox" class="checkbox__input">
      <span class="checkbox__box">
        <svg class="checkbox__icon checkbox__icon--check"><use href="#check-small"></use></svg>
        <svg class="checkbox__icon checkbox__icon--hr"><use href="#hr"></use></svg>
      </span>
      <span class="checkbox__label">Label</span>
    </label>
  </div>

  <!-- Row 3: disabled -->
  <div class="showcase__row">
    <span class="showcase__label">Disabled — unchecked &amp; checked</span>

    <label class="checkbox">
      <input type="checkbox" class="checkbox__input" disabled>
      <span class="checkbox__box">
        <svg class="checkbox__icon checkbox__icon--check"><use href="#check-small"></use></svg>
        <svg class="checkbox__icon checkbox__icon--hr"><use href="#hr"></use></svg>
      </span>
      <span class="checkbox__label">Label</span>
    </label>

    <label class="checkbox">
      <input type="checkbox" class="checkbox__input" checked disabled>
      <span class="checkbox__box">
        <svg class="checkbox__icon checkbox__icon--check"><use href="#check-small"></use></svg>
        <svg class="checkbox__icon checkbox__icon--hr"><use href="#hr"></use></svg>
      </span>
      <span class="checkbox__label">Label</span>
    </label>
  </div>

</main>

</body>
</html>
