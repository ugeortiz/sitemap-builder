<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabs — Vanilla Lexicon</title>
  <script>(function(){
    var S=['light','light-hc','dark','dark-hc'];
    function apply(){try{
      var r=document.documentElement;
      var s=localStorage.getItem('vanilla-skin')||'light';
      S.forEach(function(c){r.classList.remove(c);});
      r.classList.add(S.indexOf(s)>-1?s:'light');
      if(localStorage.getItem('vanilla-cms-style')==='1'){
        r.style.setProperty('--rounded-sm','4px');
        r.style.setProperty('--rounded-md','8px');
        r.style.setProperty('--rounded-lg','16px');
      }else{
        r.style.removeProperty('--rounded-sm');
        r.style.removeProperty('--rounded-md');
        r.style.removeProperty('--rounded-lg');
      }
    }catch(e){}}
    apply();
    window.addEventListener('pageshow',apply);
  })()</script>
  <link rel="stylesheet" href="../tokens.css">
  <link rel="stylesheet" href="../tokens-high-contrast.css">
  <link rel="stylesheet" href="../tokens-dark.css">
  <link rel="stylesheet" href="../components.css">
  <script src="../icons.js"></script>

  <style>
    .showcase { max-width: 720px; margin: 0 auto; padding: var(--spacing-9) var(--spacing-7); background: var(--color-light-l1); }
    body { background: var(--color-light-l1); }
    .showcase h1 { font-size: var(--font-size-md); font-weight: var(--font-weight-bold); margin: 0 0 var(--spacing-3); }
    .showcase p.lead { color: var(--color-secondary); font-size: var(--font-size-sm); margin: 0 0 var(--spacing-8); }
    .showcase__row { margin-bottom: var(--spacing-9); }
    .showcase__label { display: block; font-size: 10px; font-weight: var(--font-weight-bold); text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-secondary); margin-bottom: var(--spacing-3); }
  </style>
</head>
<body>

<main class="showcase">
  <h1>Tabs</h1>
  <p class="lead">
    Source: <a href="https://www.figma.com/design/YNNkt9Xd6ImDtEvIz4tETF/Lexicon-Components?node-id=1008-17763">Figma — Lexicon Components</a>.
    Horizontal row over a baseline. Active tab gets a white card.
  </p>

  <div class="showcase__row">
    <span class="showcase__label">Default — first tab active</span>
    <nav class="tabs" role="tablist">
      <button class="tabs__tab is-active" role="tab" aria-selected="true">Details</button>
      <button class="tabs__tab" role="tab">Connections</button>
      <button class="tabs__tab" role="tab">Nodes</button>
      <button class="tabs__tab" role="tab">Advanced</button>
    </nav>
  </div>

  <div class="showcase__row">
    <span class="showcase__label">Focus — Nodes focused while Details is active</span>
    <nav class="tabs" role="tablist">
      <button class="tabs__tab is-active" role="tab" aria-selected="true">Details</button>
      <button class="tabs__tab" role="tab">Connections</button>
      <button class="tabs__tab" role="tab" style="box-shadow: var(--focus-ring)">Nodes</button>
      <button class="tabs__tab" role="tab">Advanced</button>
    </nav>
  </div>

  <div class="showcase__row">
    <span class="showcase__label">Two tabs</span>
    <nav class="tabs" role="tablist">
      <button class="tabs__tab is-active" role="tab" aria-selected="true">Details</button>
      <button class="tabs__tab" role="tab">Connections</button>
    </nav>
  </div>

  <div class="showcase__row">
    <span class="showcase__label">Many tabs + disabled</span>
    <nav class="tabs" role="tablist">
      <button class="tabs__tab is-active" role="tab" aria-selected="true">Details</button>
      <button class="tabs__tab" role="tab">Connections</button>
      <button class="tabs__tab" role="tab">Nodes</button>
      <button class="tabs__tab" role="tab">Advanced</button>
      <button class="tabs__tab" role="tab">Options</button>
      <button class="tabs__tab" role="tab" disabled>Motion</button>
    </nav>
  </div>

</main>

</body>
</html>
