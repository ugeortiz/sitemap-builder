<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vertical Bar — Vanilla Lexicon</title>
  <script>(function(){
    var S=['light','light-hc','dark','dark-hc'];
    function apply(){try{
      var r=document.documentElement;
      var s=localStorage.getItem('vanilla-skin')||'light';
      S.forEach(function(c){r.classList.remove(c);});
      r.classList.add(S.indexOf(s)>-1?s:'light');
      if(localStorage.getItem('vanilla-cms-style')==='1'){
        r.style.setProperty('--rounded-sm','4px');
        r.style.setProperty('--rounded-md','8px');
        r.style.setProperty('--rounded-lg','16px');
      }else{
        r.style.removeProperty('--rounded-sm');
        r.style.removeProperty('--rounded-md');
        r.style.removeProperty('--rounded-lg');
      }
    }catch(e){}}
    apply();
    window.addEventListener('pageshow',apply);
  })()</script>
  <link rel="stylesheet" href="../tokens.css">
  <link rel="stylesheet" href="../tokens-high-contrast.css">
  <link rel="stylesheet" href="../tokens-dark.css">
  <link rel="stylesheet" href="../components.css">
  <script src="../icons.js"></script>

  <style>
    .showcase { max-width: 880px; margin: 0 auto; padding: var(--spacing-9) var(--spacing-7); }
    .showcase h1 { font-size: var(--font-size-md); font-weight: var(--font-weight-bold); margin: 0 0 var(--spacing-3); }
    .showcase p.lead { color: var(--color-secondary); font-size: var(--font-size-sm); margin: 0 0 var(--spacing-8); }
    .showcase__row { margin-bottom: var(--spacing-9); display: flex; gap: var(--spacing-7); align-items: stretch; padding: var(--spacing-5); background: var(--color-light); border-radius: var(--rounded-md); min-height: 480px; }
    .showcase__label { flex: 0 0 100%; display: block; font-size: 10px; font-weight: var(--font-weight-bold); text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-secondary); margin-bottom: var(--spacing-3); }
  </style>
</head>
<body>

<main class="showcase">
  <h1>Vertical Bar</h1>
  <p class="lead">
    Source: <a href="https://www.figma.com/design/YNNkt9Xd6ImDtEvIz4tETF/Lexicon-Components?node-id=1571-15114">Figma — Lexicon Components</a>.
    Narrow icon-only sidebar (40px wide). Two clusters separated by a divider, second cluster pinned to the bottom (<code>--end</code>). Active button gets a primary-l1 left rail.
  </p>

  <div class="showcase__row">
    <span class="showcase__label">Default · with active selection · with bottom cluster</span>

    <nav class="vert-bar">
      <ul class="vert-bar__cluster">
        <li><button class="vert-bar__btn" aria-label="User"><svg class="lexicon-icon"><use href="#user"></use></svg></button></li>
        <li><button class="vert-bar__btn" aria-label="Notifications"><svg class="lexicon-icon"><use href="#bell-on"></use></svg></button></li>
        <li><button class="vert-bar__btn" aria-label="Info"><svg class="lexicon-icon"><use href="#info-circle-open"></use></svg></button></li>
        <li><button class="vert-bar__btn" aria-label="Text"><span style="font-family: serif; font-size: 14px;">T<sub>T</sub></span></button></li>
      </ul>
      <ul class="vert-bar__cluster">
        <li><button class="vert-bar__btn" aria-label="Heading"><span style="font-weight: 700; font-size: 12px;">h1</span></button></li>
        <li><button class="vert-bar__btn" aria-label="Fill"><svg class="lexicon-icon"><use href="#paint-roller"></use></svg></button></li>
      </ul>
      <ul class="vert-bar__cluster vert-bar__cluster--end">
        <li><button class="vert-bar__btn" aria-label="Comment"><svg class="lexicon-icon"><use href="#comments"></use></svg></button></li>
        <li><button class="vert-bar__btn" aria-label="Adjust"><svg class="lexicon-icon"><use href="#adjust"></use></svg></button></li>
        <li><button class="vert-bar__btn" aria-label="Trash"><svg class="lexicon-icon"><use href="#trash"></use></svg></button></li>
      </ul>
    </nav>

    <nav class="vert-bar">
      <ul class="vert-bar__cluster">
        <li><button class="vert-bar__btn is-active" aria-label="User"><svg class="lexicon-icon"><use href="#user"></use></svg></button></li>
        <li><button class="vert-bar__btn" aria-label="Notifications"><svg class="lexicon-icon"><use href="#bell-on"></use></svg></button></li>
        <li><button class="vert-bar__btn" aria-label="Info"><svg class="lexicon-icon"><use href="#info-circle-open"></use></svg></button></li>
        <li><button class="vert-bar__btn" aria-label="Text"><span style="font-family: serif; font-size: 14px;">T<sub>T</sub></span></button></li>
      </ul>
      <ul class="vert-bar__cluster">
        <li><button class="vert-bar__btn" aria-label="Heading"><span style="font-weight: 700; font-size: 12px;">h1</span></button></li>
        <li><button class="vert-bar__btn" aria-label="Fill"><svg class="lexicon-icon"><use href="#paint-roller"></use></svg></button></li>
      </ul>
      <ul class="vert-bar__cluster vert-bar__cluster--end">
        <li><button class="vert-bar__btn" aria-label="Comment"><svg class="lexicon-icon"><use href="#comments"></use></svg></button></li>
        <li><button class="vert-bar__btn" aria-label="Adjust"><svg class="lexicon-icon"><use href="#adjust"></use></svg></button></li>
        <li><button class="vert-bar__btn" aria-label="Trash"><svg class="lexicon-icon"><use href="#trash"></use></svg></button></li>
      </ul>
    </nav>
  </div>

</main>

</body>
</html>
